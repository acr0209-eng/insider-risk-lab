<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awareness - Insider Risk Lab</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card survey-card">
        <div class="progress-wrap">
            <div class="muted">마지막 공통 문항</div>
            <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
        </div>

        <h1>보안 인식 문항</h1>
        <p class="muted">아래 문항은 특정 상황이 아니라, 내부자료 반출과 보안규정에 대한 일반적인 인식을 묻는 공통 문항입니다.</p>

        <form th:action="@{/survey/awareness}" th:object="${awarenessForm}" method="post">
            <p class="error" th:if="${#fields.hasErrors('*')}">모든 문항에 1~5점으로 응답해주세요.</p>

            <section class="survey-section">
                <table class="matrix-table">
                    <thead>
                    <tr><th>문항</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>
                    </thead>
                    <tbody>
                    <tr th:replace="~{fragments :: scaleRow('awarenessQ1', '내부자료 반출은 기업에 심각한 피해를 줄 수 있다고 생각한다.')}"></tr>
                    <tr th:replace="~{fragments :: scaleRow('awarenessQ2', '개인 이메일이나 개인 클라우드 사용은 보안상 위험하다고 생각한다.')}"></tr>
                    <tr th:replace="~{fragments :: scaleRow('awarenessQ3', '보안규정을 위반하면 의도와 관계없이 책임이 발생할 수 있다고 생각한다.')}"></tr>
                    </tbody>
                </table>
            </section>

            <button class="button" type="submit">최종 제출</button>
        </form>
    </div>
</div>
</body>
</html>
