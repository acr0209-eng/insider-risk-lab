<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="scaleRow(fieldName, questionText)">
    <td class="question-text" th:text="${questionText}">문항</td>
    <td th:each="score : ${#numbers.sequence(1,5)}" class="score-cell">
        <label class="score-option">
            <input type="radio" th:field="*{__${fieldName}__}" th:value="${score}">
            <span th:text="${score}">1</span>
        </label>
    </td>
</tr>
</body>
</html>
