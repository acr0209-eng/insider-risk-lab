<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insider Risk Lab</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Insider Risk Lab</h1>
        <p class="muted">업무 상황에서 발생할 수 있는 내부자료 반출 판단 설문</p>
        <p>본 설문은 업무 상황에서 개인이 어떤 판단을 하는지 확인하기 위한 연구입니다. 제시되는 4개의 상황을 순서대로 읽고, 본인의 판단에 가장 가까운 응답을 선택해주세요.</p>
        <div class="grid">
            <div class="stat"><strong>4개</strong><br>상황 시나리오</div>
            <div class="stat"><strong>5점</strong><br>응답 척도</div>
            <div class="stat"><strong>약 3분</strong><br>예상 소요 시간</div>
        </div>
        <a class="button" th:href="@{/survey/start}">설문 시작하기</a>
    </div>
</div>
</body>
</html>
