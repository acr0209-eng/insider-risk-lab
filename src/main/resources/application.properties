spring.application.name=insider-risk-lab

# Railway/production uses environment variables.
# Local fallback values are kept for development only.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/insider_risk_lab?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PUT_YOUR_MYSQL_PASSWORD_HERE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Admin login. Set these as Railway Variables in production.
ADMIN_USERNAME=${ADMIN_USERNAME:admin}
ADMIN_PASSWORD=${ADMIN_PASSWORD:admin1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
server.port=${PORT:8080}
